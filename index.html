<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Drift Mobile</title>
    <style>
        :root { --neon: #00f2ff; --warn: #ff3366; --bg: #020406; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* THE UI LAYER - Must stay on top */
        #ui-layer { 
            position: fixed; inset: 0; z-index: 9999; 
            display: flex; align-items: center; justify-content: center; 
            background: rgba(0,0,0,0.85); backdrop-filter: blur(5px);
        }
        
        .card { 
            background: #0a0f1e; border: 2px solid var(--neon); padding: 20px; 
            width: 90%; max-width: 350px; text-align: center; display: none; 
        }
        .active { display: block !important; }

        h1 { color: var(--neon); margin: 0 0 20px 0; font-size: 24px; }
        
        /* BIG BUTTONS FOR MOBILE */
        button { 
            display: block; width: 100%; padding: 18px; margin: 10px 0;
            background: var(--neon); color: #000; border: none;
            font-weight: bold; font-size: 16px; border-radius: 8px;
            cursor: pointer; touch-action: manipulation;
        }
        button:active { background: #fff; transform: scale(0.98); }
        .sec { background: transparent; border: 1px solid var(--neon); color: var(--neon); }

        canvas { position: absolute; top: 0; left: 0; z-index: 1; display: block; }

        #hud { position: fixed; top: 10px; left: 10px; right: 10px; z-index: 100; display: none; color: #fff; font-size: 12px; pointer-events: none; }
        .ctrls { position: fixed; bottom: 30px; width: 100%; z-index: 100; display: none; padding: 0 20px; }
        .stick { width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; position: relative; }
        .nub { width: 40px; height: 40px; background: var(--neon); border-radius: 50%; position: absolute; top: 30px; left: 30px; }
        #fire { width: 80px; height: 80px; background: var(--warn); border-radius: 50%; float: right; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="m-menu" class="card active">
        <h1>STAR DRIFT</h1>
        <button onclick="show('m-shop')">SHOP</button>
        <button onclick="show('m-guide')" class="sec">GUIDE</button>
        <button onclick="start()" style="background:var(--warn); color:#fff; margin-top:20px;">ENTER SPACE</button>
    </div>

    <div id="m-shop" class="card">
        <h1>HANGAR SHOP</h1>
        <p id="v-status" style="color:#aaa; font-size:12px;">Vault: Empty</p>
        <button onclick="buy('hp')" class="sec">UPGRADE HULL (10 Ti)</button>
        <button onclick="buy('fuel')" class="sec">UPGRADE FUEL (20 H)</button>
        <button onclick="show('m-menu')">BACK</button>
    </div>

    <div id="m-guide" class="card">
        <h1>HOW TO PLAY</h1>
        <p style="color:#ccc; font-size:14px; text-align:left;">
            1. Use Left Stick to move.<br>
            2. Fly near planets to mine.<br>
            3. Return to [0,0] (Cyan) to sell.<br>
            4. Don't run out of fuel!
        </p>
        <button onclick="show('m-menu')">GOT IT</button>
    </div>
</div>

<div id="hud">
    FUEL: <span id="f-val">100</span>% | CR: <span id="c-val">0</span>
</div>

<div class="ctrls" id="ui-ctrls">
    <div style="float:left;" id="stk-area" class="stick"><div id="nub" class="nub"></div></div>
    <div id="fire">FIRE</div>
</div>

<canvas id="g"></canvas>

<script>
const canvas = document.getElementById('g'), ctx = canvas.getContext('2d');
let w, h, playing = false, lastTime = 0;
let ship = { x:0, y:0, vx:0, vy:0, fuel:100, cr:0, vault:{H:0, Ti:0} };

// UI TOGGLES
window.show = function(id) {
    document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
    document.getElementById(id).classList.add('active');
};

window.start = function() {
    document.getElementById('ui-layer').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    document.getElementById('ui-ctrls').style.display = 'block';
    playing = true;
    animate();
};

window.buy = function(type) {
    alert("Not enough resources in vault!");
};

// INITIALIZE
function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// SIMPLE MOVEMENT FOR TESTING
let jX = 0, jY = 0;
const stickArea = document.getElementById('stk-area');
const nub = document.getElementById('nub');

stickArea.addEventListener('pointerdown', move);
stickArea.addEventListener('pointermove', move);
stickArea.addEventListener('pointerup', () => { jX = 0; jY = 0; nub.style.left = '30px'; nub.style.top = '30px'; });

function move(e) {
    const rect = stickArea.getBoundingClientRect();
    const x = e.clientX - rect.left - 50;
    const y = e.clientY - rect.top - 50;
    const dist = Math.hypot(x, y);
    const max = 40;
    jX = (dist > max ? x * max / dist : x) / max;
    jY = (dist > max ? y * max / dist : y) / max;
    nub.style.left = (30 + jX * 30) + 'px';
    nub.style.top = (30 + jY * 30) + 'px';
}

// GAME LOOP
function animate(t) {
    if(!playing) return;
    const dt = (t - lastTime) / 1000 || 0;
    lastTime = t;

    // Logic
    ship.vx += jX * 10; ship.vy += jY * 10;
    ship.vx *= 0.9; ship.vy *= 0.9;
    ship.x += ship.vx; ship.y += ship.vy;
    ship.fuel -= 0.05;

    document.getElementById('f-val').innerText = Math.floor(ship.fuel);

    // Draw
    ctx.fillStyle = '#000';
    ctx.fillRect(0,0,w,h);
    
    ctx.save();
    ctx.translate(w/2, h/2);
    // Draw Mothership
    ctx.fillStyle = '#00f2ff';
    ctx.beginPath(); ctx.arc(-ship.x, -ship.y, 100, 0, Math.PI*2); ctx.fill();
    // Draw Ship
    ctx.fillStyle = '#fff';
    ctx.fillRect(-10, -10, 20, 20);
    ctx.restore();

    requestAnimationFrame(animate);
}
</script>
</body>
</html>
