<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Drift: Structured</title>
    <style>
        :root { --neon: #00f2ff; --warn: #ff3366; --bg: #020406; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }

        /* --- UI LAYER --- */
        #ui-root {
            position: fixed; inset: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.8); pointer-events: auto;
        }

        .menu-card {
            background: #111; border: 2px solid var(--neon);
            padding: 30px; width: 320px; border-radius: 12px;
            text-align: center; color: var(--neon); display: none;
        }
        .active { display: block; }

        button {
            width: 100%; padding: 15px; margin: 10px 0;
            background: var(--neon); border: none; font-weight: bold;
            border-radius: 6px; cursor: pointer; text-transform: uppercase;
        }
        button:active { transform: scale(0.98); opacity: 0.8; }
        .btn-sec { background: transparent; border: 1px solid var(--neon); color: var(--neon); }

        /* --- GAME OVERLAY --- */
        #hud { position: fixed; top: 20px; width: 100%; padding: 0 20px; display: none; color: #fff; z-index: 50; pointer-events: none; }
        #controls { position: fixed; bottom: 40px; width: 100%; padding: 0 30px; display: none; z-index: 50; }
        
        .stick { width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%; position: relative; border: 2px solid rgba(0,242,255,0.2); }
        .nub { width: 40px; height: 40px; background: var(--neon); border-radius: 50%; position: absolute; top: 30px; left: 30px; box-shadow: 0 0 15px var(--neon); }
        #fire { width: 80px; height: 80px; background: var(--warn); border-radius: 50%; float: right; }

        canvas { position: absolute; inset: 0; z-index: 1; }
    </style>
</head>
<body>

    <div id="ui-root">
        <div id="screen-main" class="menu-card active">
            <h1>STAR DRIFT</h1>
            <p style="margin: 15px 0; color: #888;">Deep Space Mining Sim</p>
            <button id="btn-start">Launch Mission</button>
            <button id="btn-to-shop" class="btn-sec">Hangar Shop</button>
        </div>

        <div id="screen-shop" class="menu-card">
            <h1>HANGAR</h1>
            <div style="margin: 20px 0; font-size: 13px;">
                <p>Vault: <span id="vault-status">Empty</span></p>
                <button class="btn-buy" data-type="hp">Upgrade Hull</button>
                <button class="btn-buy" data-type="fuel">Expand Fuel</button>
            </div>
            <button id="btn-back" class="btn-sec">Back to Hub</button>
        </div>
    </div>

    <div id="hud">
        <span>FUEL: <span id="stat-fuel">100</span>%</span>
        <span style="float:right;">CR: <span id="stat-cr">0</span></span>
    </div>

    <div id="controls">
        <div id="stk-base" class="stick"><div id="stk-nub" class="nub"></div></div>
        <div id="fire"></div>
    </div>

    <canvas id="stage"></canvas>

<script>
/** * STAR DRIFT - STRUCTURED BUILD
 * ----------------------------
 */

// 1. GAME STATE & CONSTANTS
const STATE = { MENU: 0, SHOP: 1, PLAYING: 2 };
let currentMode = STATE.MENU;

const ship = { x:0, y:0, vx:0, vy:0, fuel:100, cr:0, vault:{} };
const input = { x:0, y:0 };

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let w, h, lastTime = 0;

// 2. UI NAVIGATION
function setScreen(mode) {
    currentMode = mode;
    document.getElementById('ui-root').style.display = (mode === STATE.PLAYING) ? 'none' : 'flex';
    document.getElementById('hud').style.display = (mode === STATE.PLAYING) ? 'block' : 'none';
    document.getElementById('controls').style.display = (mode === STATE.PLAYING) ? 'block' : 'none';

    document.querySelectorAll('.menu-card').forEach(c => c.classList.remove('active'));
    if (mode === STATE.MENU) document.getElementById('screen-main').classList.add('active');
    if (mode === STATE.SHOP) document.getElementById('screen-shop').classList.add('active');
}

// 3. INPUT ENGINE
const stick = document.getElementById('stk-base');
const nub = document.getElementById('stk-nub');

function handleTouch(e) {
    if (currentMode !== STATE.PLAYING) return;
    e.preventDefault();
    const t = e.touches ? e.touches[0] : e;
    const r = stick.getBoundingClientRect();
    const cx = r.left + r.width/2, cy = r.top + r.height/2;
    let dx = t.clientX - cx, dy = t.clientY - cy;
    const dist = Math.sqrt(dx*dx + dy*dy), max = 30;
    
    if (dist > max) { dx *= max/dist; dy *= max/dist; }
    input.x = dx/max; input.y = dy/max;
    nub.style.transform = `translate(${dx}px, ${dy}px)`;
}

stick.addEventListener('touchstart', handleTouch, {passive:false});
stick.addEventListener('touchmove', handleTouch, {passive:false});
stick.addEventListener('touchend', () => {
    input.x = 0; input.y = 0;
    nub.style.transform = `translate(0px, 0px)`;
});

// 4. GAME ENGINE
function update(dt) {
    if (currentMode !== STATE.PLAYING) return;

    ship.vx += input.x * 0.5;
    ship.vy += input.y * 0.5;
    ship.vx *= 0.94; ship.vy *= 0.94;
    ship.x += ship.vx; ship.y += ship.vy;
    ship.fuel -= 0.02;

    document.getElementById('stat-fuel').innerText = Math.floor(ship.fuel);

    // Docking check
    if (Math.sqrt(ship.x*ship.x + ship.y*ship.y) < 50 && Math.abs(ship.vx) < 1) {
        setScreen(STATE.MENU);
        ship.fuel = 100;
    }
}

function render() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0,0,w,h);

    if (currentMode === STATE.PLAYING) {
        ctx.save();
        ctx.translate(w/2, h/2);
        // Mothership
        ctx.fillStyle = "#00f2ff";
        ctx.beginPath(); ctx.arc(-ship.x, -ship.y, 60, 0, Math.PI*2); ctx.fill();
        // Player
        ctx.fillStyle = "#fff";
        ctx.fillRect(-10, -10, 20, 20);
        ctx.restore();
    }
}

function loop(t) {
    const dt = (t - lastTime) / 1000 || 0;
    lastTime = t;
    update(dt);
    render();
    requestAnimationFrame(loop);
}

// 5. INITIALIZATION & EVENTS
window.addEventListener('resize', () => {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
});
window.dispatchEvent(new Event('resize'));

// Button Event Binding
document.getElementById('btn-start').onclick = () => setScreen(STATE.PLAYING);
document.getElementById('btn-to-shop').onclick = () => setScreen(STATE.SHOP);
document.getElementById('btn-back').onclick = () => setScreen(STATE.MENU);

requestAnimationFrame(loop);
</script>
</body>
</html>
