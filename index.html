<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Drift (Refactored)</title>
<style>
body { margin:0; background:#0a0f1e; overflow:hidden; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// =========================
// CONSTANTS
// =========================
const CONFIG = {
  PLAYER_SPEED: 290,
  PLAYER_ACCEL: 15,
  DRAG: 0.9,
  BULLET_SPEED: 660,
  BULLET_LIFE: 1.3,
  ASTEROID_BASE: 10
};

// =========================
// SETUP
// =========================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// =========================
// GAME STATE
// =========================
const state = {
  paused: false,
  wave: 1
};

// =========================
// PLAYER
// =========================
const player = {
  x: 0,
  y: 0,
  vx: 0,
  vy: 0,
  angle: 0,
  hp: 100,
  shield: 0,
  cooldown: 0
};

// =========================
// ENTITIES
// =========================
const bullets = [];
const asteroids = [];

// =========================
// INPUT
// =========================
const keys = new Set();
window.addEventListener("keydown", e => keys.add(e.key.toLowerCase()));
window.addEventListener("keyup", e => keys.delete(e.key.toLowerCase()));

// =========================
// HELPERS
// =========================
function dist2(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  return dx*dx + dy*dy;
}

// =========================
// SPAWNING
// =========================
function spawnAsteroid() {
  const angle = Math.random()*Math.PI*2;
  const dist = 800 + Math.random()*400;
  const x = player.x + Math.cos(angle)*dist;
  const y = player.y + Math.sin(angle)*dist;

  const dir = Math.atan2(player.y - y, player.x - x);

  asteroids.push({
    x, y,
    vx: Math.cos(dir)*100,
    vy: Math.sin(dir)*100,
    r: 20 + Math.random()*20,
    hp: 30
  });
}

function startWave() {
  for (let i=0;i<CONFIG.ASTEROID_BASE + state.wave*2;i++) {
    spawnAsteroid();
  }
}
startWave();

// =========================
// SHOOT
// =========================
function fire() {
  if (player.cooldown > 0) return;
  player.cooldown = 0.2;

  bullets.push({
    x: player.x,
    y: player.y,
    vx: Math.cos(player.angle)*CONFIG.BULLET_SPEED,
    vy: Math.sin(player.angle)*CONFIG.BULLET_SPEED,
    life: CONFIG.BULLET_LIFE,
    angle: player.angle
  });
}

// =========================
// UPDATE
// =========================
function update(dt) {
  if (state.paused) return;

  // Movement
  let ax = 0, ay = 0;
  if (keys.has("w") || keys.has("arrowup")) ay -= CONFIG.PLAYER_ACCEL;
  if (keys.has("s") || keys.has("arrowdown")) ay += CONFIG.PLAYER_ACCEL;
  if (keys.has("a") || keys.has("arrowleft")) ax -= CONFIG.PLAYER_ACCEL;
  if (keys.has("d") || keys.has("arrowright")) ax += CONFIG.PLAYER_ACCEL;

  player.vx += ax;
  player.vy += ay;

  player.vx *= CONFIG.DRAG;
  player.vy *= CONFIG.DRAG;

  player.x += player.vx * dt;
  player.y += player.vy * dt;

  if (Math.abs(player.vx)+Math.abs(player.vy) > 1) {
    player.angle = Math.atan2(player.vy, player.vx);
  }

  // Shooting
  if (keys.has(" ")) fire();
  player.cooldown -= dt;

  // Bullets
  for (let i=bullets.length-1;i>=0;i--) {
    const b = bullets[i];
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;
    if (b.life <= 0) bullets.splice(i,1);
  }

  // Asteroids
  for (let i=asteroids.length-1;i>=0;i--) {
    const a = asteroids[i];
    a.x += a.vx * dt;
    a.y += a.vy * dt;

    // collision
    for (let j=bullets.length-1;j>=0;j--) {
      const b = bullets[j];
      if (dist2(a,b) < (a.r*a.r)) {
        a.hp -= 10;
        bullets.splice(j,1);
        if (a.hp <= 0) {
          asteroids.splice(i,1);
          break;
        }
      }
    }
  }

  // Maintain wave
  if (asteroids.length === 0) {
    state.wave++;
    startWave();
  }
}

// =========================
// RENDER
// =========================
function render() {
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,W,H);

  const cx = W/2;
  const cy = H/2;

  // Player
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(player.angle);
  ctx.fillStyle = "white";
  ctx.beginPath();
  ctx.moveTo(15,0);
  ctx.lineTo(-10,-8);
  ctx.lineTo(-10,8);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // Bullets
  ctx.strokeStyle = "cyan";
  for (const b of bullets) {
    const x = cx + (b.x - player.x);
    const y = cy + (b.y - player.y);
    ctx.beginPath();
    ctx.moveTo(x,y);
    ctx.lineTo(x - Math.cos(b.angle)*5, y - Math.sin(b.angle)*5);
    ctx.stroke();
  }

  // Asteroids
  ctx.fillStyle = "gray";
  for (const a of asteroids) {
    const x = cx + (a.x - player.x);
    const y = cy + (a.y - player.y);
    ctx.beginPath();
    ctx.arc(x,y,a.r,0,Math.PI*2);
    ctx.fill();
  }
}

// =========================
// LOOP
// =========================
let last = performance.now();
function loop(now) {
  const dt = Math.min(0.033,(now-last)/1000);
  last = now;

  update(dt);
  render();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
