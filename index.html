<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Drift: Evolution</title>
    <style>
        :root { --neon: #00f2ff; --warn: #ff3366; --gold: #ffcc00; --bg: #020406; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }

        /* --- UI LAYER --- */
        #ui-root {
            position: fixed; inset: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.85);
        }
        .menu-card {
            background: #0a0e14; border: 2px solid var(--neon);
            padding: 30px; width: 340px; border-radius: 15px;
            text-align: center; color: var(--neon); display: none;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }
        .active { display: block; }
        h1 { font-size: 2.2rem; margin-bottom: 10px; text-shadow: 0 0 10px var(--neon); letter-spacing: 2px; }
        
        .stat-row { display: flex; justify-content: space-between; margin: 10px 0; color: #fff; font-size: 0.9rem; }
        .vault-amt { color: var(--gold); font-weight: bold; font-size: 1.2rem; }

        #shop-list { max-height: 280px; overflow-y: auto; margin: 15px 0; padding-right: 5px; }
        .shop-btn {
            width: 100%; padding: 12px; margin: 6px 0;
            background: rgba(0, 242, 255, 0.1); border: 1px solid var(--neon);
            color: #fff; border-radius: 6px; cursor: pointer; text-align: left;
            display: flex; justify-content: space-between; align-items: center;
        }
        .shop-btn:active { background: var(--neon); color: #000; }
        .shop-btn span { font-size: 0.7rem; opacity: 0.8; }

        button.primary {
            width: 100%; padding: 16px; margin: 10px 0;
            background: var(--neon); border: none; font-weight: bold;
            border-radius: 8px; cursor: pointer; text-transform: uppercase;
        }
        .btn-sec { background: transparent; border: 2px solid var(--neon); color: var(--neon); width: 100%; padding: 12px; border-radius: 8px; cursor: pointer; margin-top: 10px; }

        /* --- GAME HUD --- */
        #hud { position: fixed; top: 20px; width: 100%; padding: 0 20px; display: none; color: #fff; z-index: 50; pointer-events: none; font-family: monospace; }
        #controls { position: fixed; bottom: 40px; width: 100%; padding: 0 30px; display: none; z-index: 50; }
        
        .stick { width: 100px; height: 100px; background: rgba(255,255,255,0.05); border-radius: 50%; position: relative; border: 1px solid var(--neon); }
        .nub { width: 40px; height: 40px; background: var(--neon); border-radius: 50%; position: absolute; top: 30px; left: 30px; box-shadow: 0 0 15px var(--neon); pointer-events: none; }
        #fire { width: 85px; height: 85px; border: 3px solid var(--warn); border-radius: 50%; float: right; background: rgba(255,51,102,0.1); box-shadow: 0 0 10px var(--warn); }
        #fire:active { background: var(--warn); }

        canvas { position: absolute; inset: 0; z-index: 1; }
    </style>
</head>
<body>

    <div id="ui-root">
        <!-- Main Menu -->
        <div id="screen-main" class="menu-card active">
            <h1>STAR DRIFT</h1>
            <p style="color: #666; margin-bottom: 20px;">Deep Space Salvage v2.0</p>
            <button class="primary" id="btn-start">Launch Mission</button>
            <button class="btn-sec" id="btn-to-shop">Enter Hangar</button>
        </div>

        <!-- Shop Menu -->
        <div id="screen-shop" class="menu-card">
            <h1>HANGAR</h1>
            <div class="stat-row">VAULT: <span id="vault-status" class="vault-amt">0</span></div>
            <div id="shop-list">
                <!-- Shop items injected here -->
            </div>
            <button id="btn-back" class="btn-sec">Back to Hub</button>
        </div>
    </div>

    <div id="hud">
        FUEL: <span id="stat-fuel">100</span>% | CARGO: <span id="stat-cr">0</span> CR
    </div>

    <div id="controls">
        <div id="stk-base" class="stick"><div id="stk-nub" class="nub"></div></div>
        <div id="fire"></div>
    </div>

    <canvas id="stage"></canvas>

<script>
/** * STAR DRIFT - EVOLUTION
 * ---------------------------- */

const STATE = { MENU: 0, SHOP: 1, PLAYING: 2 };
let currentMode = STATE.MENU;

// 1. GAME DATA
const ship = { 
    x:0, y:0, vx:0, vy:0, angle:0, 
    fuel: 100, maxFuel: 100,
    cargo: 0, vault: 0, 
    miningPower: 0.4, 
    enginePower: 0.7, 
    mining: false 
};

const shopItems = [
    { id: 'fuel', name: "Energy Cell", cost: 50, lv: 1, icon: "🔋", desc: "+50 Max Fuel" },
    { id: 'drill', name: "Laser Lens", cost: 80, lv: 1, icon: "💎", desc: "+25% Mining Speed" },
    { id: 'engine', name: "Thruster", cost: 120, lv: 1, icon: "🚀", desc: "+15% Acceleration" }
];

const input = { x:0, y:0 };
const camera = { x:0, y:0 };
const stars = Array.from({length: 120}, () => ({ 
    x: Math.random()*4000-2000, y: Math.random()*4000-2000, z: Math.random()*0.5+0.1 
}));
const asteroids = Array.from({length: 30}, () => ({
    x: (Math.random()-0.5)*3500, y: (Math.random()-0.5)*3500,
    size: 25+Math.random()*45, color: `hsl(${190+Math.random()*50}, 60%, 60%)`
}));

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let w, h, lastTime = 0;

// 2. UI & SHOP LOGIC
function setScreen(mode) {
    currentMode = mode;
    document.getElementById('ui-root').style.display = (mode === STATE.PLAYING) ? 'none' : 'flex';
    document.getElementById('hud').style.display = (mode === STATE.PLAYING) ? 'block' : 'none';
    document.getElementById('controls').style.display = (mode === STATE.PLAYING) ? 'block' : 'none';
    
    document.querySelectorAll('.menu-card').forEach(c => c.classList.remove('active'));
    if (mode === STATE.MENU) document.getElementById('screen-main').classList.add('active');
    if (mode === STATE.SHOP) {
        document.getElementById('screen-shop').classList.add('active');
        renderShop();
    }
}

function renderShop() {
    const list = document.getElementById('shop-list');
    document.getElementById('vault-status').innerText = Math.floor(ship.vault) + " CR";
    list.innerHTML = "";
    
    shopItems.forEach(item => {
        const btn = document.createElement('div');
        btn.className = "shop-btn";
        btn.innerHTML = `<div>${item.icon} ${item.name} (Lv.${item.lv})<br><span>${item.desc}</span></div><b>${item.cost}</b>`;
        btn.onclick = () => {
            if (ship.vault >= item.cost) {
                ship.vault -= item.cost;
                item.lv++;
                if (item.id === 'fuel') ship.maxFuel += 50;
                if (item.id === 'drill') ship.miningPower += 0.2;
                if (item.id === 'engine') ship.enginePower += 0.15;
                item.cost = Math.floor(item.cost * 1.6);
                renderShop();
            } else {
                alert("Insufficient credits in Vault!");
            }
        };
        list.appendChild(btn);
    });
}

// 3. INPUT
const stick = document.getElementById('stk-base');
const nub = document.getElementById('stk-nub');
const fireBtn = document.getElementById('fire');

function handleMove(e) {
    if (currentMode !== STATE.PLAYING) return;
    const t = e.touches ? e.touches[0] : e;
    const r = stick.getBoundingClientRect();
    const cx = r.left + r.width/2, cy = r.top + r.height/2;
    let dx = t.clientX - cx, dy = t.clientY - cy;
    const dist = Math.sqrt(dx*dx + dy*dy), max = 40;
    if (dist > max) { dx *= max/dist; dy *= max/dist; }
    input.x = dx/max; input.y = dy/max;
    nub.style.transform = `translate(${dx}px, ${dy}px)`;
}

const resetInp = () => { input.x = 0; input.y = 0; nub.style.transform = `translate(0,0)`; };
stick.addEventListener('touchstart', handleMove);
stick.addEventListener('touchmove', handleMove);
stick.addEventListener('touchend', resetInp);
// Mouse support
stick.addEventListener('mousedown', (e) => {
    handleMove(e);
    const mm = (me) => handleMove(me);
    const mu = () => { window.removeEventListener('mousemove', mm); window.removeEventListener('mouseup', mu); resetInp(); };
    window.addEventListener('mousemove', mm);
    window.addEventListener('mouseup', mu);
});

fireBtn.onmousedown = fireBtn.ontouchstart = (e) => { e.preventDefault(); ship.mining = true; };
window.onmouseup = window.ontouchend = () => ship.mining = false;

// 4. ENGINE
function update(dt) {
    if (currentMode !== STATE.PLAYING) return;

    ship.vx += input.x * ship.enginePower;
    ship.vy += input.y * ship.enginePower;
    ship.vx *= 0.94; ship.vy *= 0.94;
    ship.x += ship.vx; ship.y += ship.vy;
    if (Math.abs(ship.vx) > 0.1) ship.angle = Math.atan2(ship.vy, ship.vx);
    
    ship.fuel -= 0.03;

    if (ship.mining) {
        asteroids.forEach(a => {
            const d = Math.hypot(a.x - ship.x, a.y - ship.y);
            if (d < a.size + 90) {
                ship.cargo += ship.miningPower;
                ship.fuel -= 0.04;
            }
        });
    }

    // Docking Logic
    const distToStation = Math.hypot(ship.x, ship.y);
    if (distToStation < 75 && Math.abs(ship.vx) < 1.2) {
        if (ship.cargo > 0) {
            ship.vault += Math.floor(ship.cargo);
            ship.cargo = 0;
        }
        ship.fuel = ship.maxFuel;
        setScreen(STATE.MENU);
    }

    if (ship.fuel <= 0) {
        alert("Ship Disabled: Energy Depleted. Cargo lost.");
        ship.cargo = 0; ship.fuel = ship.maxFuel; ship.x = 0; ship.y = 0;
        setScreen(STATE.MENU);
    }

    document.getElementById('stat-fuel').innerText = Math.max(0, Math.floor((ship.fuel/ship.maxFuel)*100));
    document.getElementById('stat-cr').innerText = Math.floor(ship.cargo);
}

function render() {
    ctx.fillStyle = "#020406";
    ctx.fillRect(0,0,w,h);
    if (currentMode !== STATE.PLAYING) return;

    camera.x += (ship.x - camera.x) * 0.1;
    camera.y += (ship.y - camera.y) * 0.1;

    ctx.save();
    ctx.translate(w/2 - camera.x, h/2 - camera.y);

    stars.forEach(s => {
        ctx.fillStyle = `rgba(255,255,255,${s.z})`;
        ctx.fillRect(s.x + camera.x*(1-s.z), s.y + camera.y*(1-s.z), 2, 2);
    });

    // Station Hub
    ctx.shadowBlur = 20; ctx.shadowColor = "#00f2ff";
    ctx.strokeStyle = "#00f2ff"; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(0,0,60,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha = 0.1; ctx.fillStyle = "#00f2ff"; ctx.fill(); ctx.globalAlpha = 1;

    // Asteroids
    asteroids.forEach(a => {
        ctx.strokeStyle = a.color; ctx.shadowBlur = 10; ctx.shadowColor = a.color;
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(a.x, a.y, a.size, 0, Math.PI*2); ctx.stroke();
        
        if (ship.mining && Math.hypot(a.x-ship.x, a.y-ship.y) < a.size + 90) {
            ctx.shadowColor = "#ff3366"; ctx.strokeStyle = "#ff3366";
            ctx.beginPath(); ctx.moveTo(ship.x, ship.y); ctx.lineTo(a.x, a.y); ctx.stroke();
        }
    });

    // Ship
    ctx.save();
    ctx.translate(ship.x, ship.y);
    ctx.rotate(ship.angle);
    ctx.shadowBlur = 15; ctx.shadowColor = "#fff";
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(16,0); ctx.lineTo(-10,-9); ctx.lineTo(-7,0); ctx.lineTo(-10,9); ctx.closePath(); ctx.stroke();
    ctx.restore();

    ctx.restore();
    ctx.shadowBlur = 0;
}

function loop(t) {
    update((t - lastTime)/1000);
    lastTime = t;
    render();
    requestAnimationFrame(loop);
}

// 5. INITIALIZE
window.addEventListener('resize', () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; });
window.dispatchEvent(new Event('resize'));

document.getElementById('btn-start').onclick = () => setScreen(STATE.PLAYING);
document.getElementById('btn-to-shop').onclick = () => setScreen(STATE.SHOP);
document.getElementById('btn-back').onclick = () => setScreen(STATE.MENU);

requestAnimationFrame(loop);
</script>
</body>
</html>
