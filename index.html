<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Drift: Mobile Fix</title>
    <style>
        :root { --neon: #00f2ff; --warn: #ff3366; --gold: #ffcc00; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; touch-action: none; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }

        /* UI LAYER - Forced to the absolute front */
        #ui-root { position: fixed; inset: 0; z-index: 1000; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.9); }
        .menu-card { background: #0a0e14; border: 3px solid var(--neon); padding: 30px; width: 320px; border-radius: 20px; text-align: center; display: none; }
        .active { display: block !important; }
        
        /* Direct touch-friendly buttons */
        .touch-target { width: 100%; padding: 25px; margin: 15px 0; background: var(--neon); color: #000; font-weight: bold; border-radius: 12px; text-transform: uppercase; font-size: 1.2rem; cursor: pointer; border: none; }
        .btn-sec { background: transparent; border: 3px solid var(--neon); color: var(--neon); }

        #hud { position: fixed; top: 20px; width: 100%; padding: 0 20px; display: none; z-index: 500; pointer-events: none; font-family: monospace; font-size: 1rem; color: #fff; }
        #controls { position: fixed; bottom: 40px; width: 100%; padding: 0 30px; display: none; z-index: 500; }
        .stick { width: 110px; height: 110px; background: rgba(255,255,255,0.05); border-radius: 50%; position: relative; border: 2px solid var(--neon); float: left; }
        #stk-nub { width: 44px; height: 44px; background: var(--neon); border-radius: 50%; position: absolute; top: 31px; left: 31px; pointer-events: none; }
        #fire { width: 90px; height: 90px; border: 4px solid var(--warn); border-radius: 50%; float: right; background: rgba(255,51,102,0.1); }
        canvas { position: absolute; inset: 0; z-index: 1; background: #000; }
    </style>
</head>
<body>

    <div id="ui-root">
        <div id="screen-main" class="menu-card active">
            <h1 style="color:var(--neon); margin-bottom:20px; font-size:2.5rem;">STAR DRIFT</h1>
            <div id="btn-launch" class="touch-target">Launch Mission</div>
            <div id="btn-shop" class="touch-target btn-sec">Hangar Shop</div>
        </div>
        <div id="screen-shop" class="menu-card">
            <h1>HANGAR</h1>
            <p>VAULT: <span id="vault-status" style="color:var(--gold)">0</span> CR</p>
            <div id="shop-list" style="margin:10px 0;"></div>
            <div id="btn-back" class="touch-target btn-sec">Back to Hub</div>
        </div>
    </div>

    <div id="hud">FUEL: <span id="stat-fuel">100</span>% | CARGO: <span id="stat-cr">0</span></div>
    <div id="controls">
        <div id="stk-base" class="stick"><div id="stk-nub"></div></div>
        <div id="fire"></div>
    </div>
    <canvas id="stage"></canvas>

<script>
const STATE = { MENU: 0, SHOP: 1, PLAYING: 2 };
let mode = STATE.MENU;

const ship = { x:0, y:0, vx:0, vy:0, angle:0, fuel:100, maxFuel:100, cargo:0, vault:0, miningPower:0.5, enginePower:0.8, mining:false };
const upgrades = [
    { id: 'fuel', name: "Fuel", cost: 40, lv: 1, icon: "🔋" },
    { id: 'drill', name: "Drill", cost: 60, lv: 1, icon: "💎" },
    { id: 'engine', name: "Motor", cost: 100, lv: 1, icon: "🚀" }
];

const input = { x: 0, y: 0 };
const camera = { x: 0, y: 0 };
const stars = Array.from({length: 80}, () => ({ x: Math.random()*3000-1500, y: Math.random()*3000-1500, z: Math.random()*0.5+0.1 }));
const asteroids = Array.from({length: 20}, () => ({ x: (Math.random()-0.5)*3000, y: (Math.random()-0.5)*3000, size: 30+Math.random()*40, color: `hsl(${190+Math.random()*50}, 60%, 60%)` }));

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let w, h, lastT = performance.now();

// --- CORE FIX: Use touchstart and preventDefault on every UI interaction ---
function attachTouch(id, fn) {
    const el = document.getElementById(id);
    el.addEventListener('touchstart', (e) => {
        e.preventDefault(); e.stopPropagation();
        fn();
    }, { passive: false });
    // Keep click for desktop testing
    el.onclick = fn;
}

function setScreen(s) {
    mode = s;
    document.getElementById('ui-root').style.display = (s === STATE.PLAYING) ? 'none' : 'flex';
    document.getElementById('hud').style.display = (s === STATE.PLAYING) ? 'block' : 'none';
    document.getElementById('controls').style.display = (s === STATE.PLAYING) ? 'block' : 'none';
    document.getElementById('screen-main').classList.toggle('active', s === STATE.MENU);
    document.getElementById('screen-shop').classList.toggle('active', s === STATE.SHOP);
    if (s === STATE.SHOP) renderShop();
}

function renderShop() {
    const list = document.getElementById('shop-list');
    document.getElementById('vault-status').innerText = Math.floor(ship.vault);
    list.innerHTML = "";
    upgrades.forEach(item => {
        const div = document.createElement('div');
        div.className = "touch-target btn-sec";
        div.style.padding = "15px";
        div.innerHTML = `${item.icon} Lv.${item.lv} - ${item.cost} CR`;
        div.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (ship.vault >= item.cost) {
                ship.vault -= item.cost;
                item.lv++;
                if (item.id === 'fuel') ship.maxFuel += 40;
                if (item.id === 'drill') ship.miningPower += 0.3;
                if (item.id === 'engine') ship.enginePower += 0.15;
                item.cost = Math.floor(item.cost * 1.7);
                renderShop();
            }
        }, { passive: false });
        list.appendChild(div);
    });
}

window.onload = () => {
    window.addEventListener('resize', () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; });
    window.dispatchEvent(new Event('resize'));

    attachTouch('btn-launch', () => { ship.fuel = ship.maxFuel; setScreen(STATE.PLAYING); });
    attachTouch('btn-shop', () => setScreen(STATE.SHOP));
    attachTouch('btn-back', () => setScreen(STATE.MENU));

    const stick = document.getElementById('stk-base');
    const nub = document.getElementById('stk-nub');
    const move = (e) => {
        e.preventDefault();
        const t = e.touches[0];
        const r = stick.getBoundingClientRect();
        const cx = r.left + r.width/2, cy = r.top + r.height/2;
        let dx = t.clientX - cx, dy = t.clientY - cy;
        const d = Math.sqrt(dx*dx+dy*dy), m = 40;
        if (d > m) { dx *= m/d; dy *= m/d; }
        input.x = dx/m; input.y = dy/m;
        nub.style.transform = `translate(${dx}px,${dy}px)`;
    };
    stick.addEventListener('touchstart', move, {passive:false});
    stick.addEventListener('touchmove', move, {passive:false});
    stick.addEventListener('touchend', () => { input.x=0; input.y=0; nub.style.transform="translate(0,0)"; });

    const fire = document.getElementById('fire');
    fire.addEventListener('touchstart', (e) => { e.preventDefault(); ship.mining = true; }, {passive:false});
    window.addEventListener('touchend', () => { ship.mining = false; });

    requestAnimationFrame(loop);
};

function loop(t) {
    const dt = (t - lastT) / 1000;
    lastT = t;
    if (mode === STATE.PLAYING) {
        ship.vx += input.x * ship.enginePower; ship.vy += input.y * ship.enginePower;
        ship.vx *= 0.94; ship.vy *= 0.94;
        ship.x += ship.vx; ship.y += ship.vy;
        if (Math.abs(ship.vx) > 0.1) ship.angle = Math.atan2(ship.vy, ship.vx);
        ship.fuel -= 0.02;
        if (ship.mining) {
            asteroids.forEach(a => {
                if (Math.hypot(a.x-ship.x, a.y-ship.y) < a.size + 80) { ship.cargo += ship.miningPower; ship.fuel -= 0.05; }
            });
        }
        if (Math.hypot(ship.x, ship.y) < 70 && Math.abs(ship.vx) < 1.5) {
            ship.vault += Math.floor(ship.cargo); ship.cargo = 0; ship.fuel = ship.maxFuel;
            setScreen(STATE.MENU);
        }
        if (ship.fuel <= 0) { alert("Fuel Out!"); ship.cargo=0; ship.x=0; ship.y=0; setScreen(STATE.MENU); }
        document.getElementById('stat-fuel').innerText = Math.max(0, Math.floor((ship.fuel/ship.maxFuel)*100));
        document.getElementById('stat-cr').innerText = Math.floor(ship.cargo);
    }
    ctx.fillStyle = "#000"; ctx.fillRect(0,0,w,h);
    if (mode === STATE.PLAYING) {
        camera.x += (ship.x-camera.x)*0.1; camera.y += (ship.y-camera.y)*0.1;
        ctx.save(); ctx.translate(w/2-camera.x, h/2-camera.y);
        stars.forEach(s => { ctx.fillStyle=`rgba(255,255,255,${s.z})`; ctx.fillRect(s.x+camera.x*(1-s.z), s.y+camera.y*(1-s.z), 2, 2); });
        ctx.strokeStyle="#00f2ff"; ctx.beginPath(); ctx.arc(0,0,60,0,Math.PI*2); ctx.stroke();
        asteroids.forEach(a => { ctx.strokeStyle=a.color; ctx.beginPath(); ctx.arc(a.x,a.y,a.size,0,Math.PI*2); ctx.stroke(); });
        ctx.save(); ctx.translate(ship.x,ship.y); ctx.rotate(ship.angle); ctx.strokeStyle="#fff"; ctx.beginPath(); ctx.moveTo(15,0); ctx.lineTo(-10,-8); ctx.lineTo(-10,8); ctx.closePath(); ctx.stroke(); ctx.restore();
        ctx.restore();
    }
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
